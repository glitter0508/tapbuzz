<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>TapBuzz - 互振</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, 'Segoe UI', sans-serif; background: #0f0f1a; color: #fff; min-height: 100dvh; display: flex; align-items: center; justify-content: center; touch-action: manipulation; overflow: hidden; }
  .container { width: 100%; max-width: 420px; padding: 32px 24px; text-align: center; position: relative; z-index: 1; }
  h1 { font-size: 36px; font-weight: 700; margin-bottom: 4px; background: linear-gradient(135deg, #667eea, #764ba2); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .subtitle { color: #666; font-size: 14px; margin-bottom: 28px; }
  .status-row { display: flex; align-items: center; justify-content: center; gap: 8px; margin-bottom: 24px; font-size: 14px; color: #888; }
  .dot { width: 10px; height: 10px; border-radius: 50%; background: #444; }
  .dot.alone { background: #facc15; box-shadow: 0 0 10px #facc1566; }
  .dot.paired { background: #4ade80; box-shadow: 0 0 10px #4ade8066; }
  .share-area { background: #1a1a2e; border-radius: 16px; padding: 24px; margin-bottom: 28px; }
  .share-area .label { font-size: 12px; color: #666; margin-bottom: 10px; }
  .link-row { display: flex; gap: 8px; }
  .link-row input { flex: 1; padding: 12px 14px; border: 1px solid #2a2a4a; border-radius: 10px; background: #0f0f1a; color: #fff; font-size: 14px; outline: none; }
  .link-row button { padding: 12px 18px; border: none; border-radius: 10px; background: #667eea; color: #fff; font-size: 14px; cursor: pointer; white-space: nowrap; }
  .link-row button:active { opacity: .8; }
  .buzz-btn {
    width: 220px; height: 220px; border-radius: 50%; border: none;
    font-size: 28px; font-weight: 700; color: #fff;
    background: linear-gradient(135deg, #f093fb, #f5576c);
    box-shadow: 0 8px 40px #f5576c55;
    cursor: pointer; transition: transform .08s, opacity .3s;
    touch-action: manipulation; -webkit-tap-highlight-color: transparent;
    margin: 0 auto;
    display: flex; align-items: center; justify-content: center;
    flex-direction: column; gap: 4px;
    position: relative;
  }
  .buzz-btn:active { transform: scale(0.90); }
  .buzz-btn.disabled { opacity: 0.35; pointer-events: none; }

  /* 按钮收到时的剧烈动画 */
  @keyframes buzzPulse {
    0%   { transform: scale(1); box-shadow: 0 0 40px #f5576c55; }
    15%  { transform: scale(1.2); box-shadow: 0 0 80px #f5576c, 0 0 120px #f093fb88; }
    30%  { transform: scale(0.95); box-shadow: 0 0 60px #f5576c; }
    45%  { transform: scale(1.1); box-shadow: 0 0 100px #f093fb; }
    60%  { transform: scale(1); box-shadow: 0 0 40px #f5576c55; }
    100% { transform: scale(1); box-shadow: 0 0 40px #f5576c55; }
  }
  .buzz-btn.receiving {
    animation: buzzPulse .8s ease-out;
  }

  /* 全屏闪光遮罩 */
  .flash-overlay {
    position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    pointer-events: none; z-index: 999;
    opacity: 0; transition: none;
  }
  .flash-overlay.go {
    opacity: 1;
    background: radial-gradient(circle at center, #fff8 0%, #f5576c44 50%, transparent 80%);
    animation: flashFade .6s ease-out forwards;
  }
  @keyframes flashFade {
    0%   { opacity: 1; }
    100% { opacity: 0; }
  }

  /* 屏幕抖动 */
  @keyframes screenShake {
    0%, 100% { transform: translate(0, 0); }
    10% { transform: translate(-4px, 2px); }
    20% { transform: translate(4px, -2px); }
    30% { transform: translate(-3px, -1px); }
    40% { transform: translate(3px, 1px); }
    50% { transform: translate(-2px, 3px); }
    60% { transform: translate(2px, -3px); }
    70% { transform: translate(-1px, -2px); }
    80% { transform: translate(1px, 2px); }
    90% { transform: translate(-2px, -1px); }
  }
  .container.shake {
    animation: screenShake .5s ease-out;
  }

  /* 收到通知横幅 */
  .banner {
    position: fixed; top: -80px; left: 0; right: 0;
    background: linear-gradient(135deg, #f093fb, #f5576c);
    color: #fff; text-align: center; padding: 16px;
    font-size: 18px; font-weight: 600; z-index: 1000;
    transition: top .3s cubic-bezier(.34,1.56,.64,1);
    box-shadow: 0 4px 20px #f5576c88;
  }
  .banner.show { top: 0; }

  .hint { color: #666; font-size: 13px; margin-top: 16px; }
  .hint strong { color: #667eea; }
  .footer { margin-top: 32px; font-size: 11px; color: #333; }
</style>
</head>
<body>

<div class="flash-overlay" id="flashOverlay"></div>
<div class="banner" id="banner">💥 对方戳了你一下！</div>

<div class="container" id="container">
  <div class="status-row">
    <span class="dot" id="dot"></span>
    <span id="statusText">初始化中...</span>
  </div>
  <h1>TapBuzz</h1>
  <div class="subtitle">点一下，对方手机就有反应</div>
  <div class="share-area" id="shareBox" style="display:none">
    <div class="label">把此链接发给对方 👇</div>
    <div class="link-row">
      <input id="shareLink" readonly onclick="this.select()">
      <button id="copyBtn" onclick="copyLink()">复制</button>
    </div>
  </div>
  <button class="buzz-btn disabled" id="buzzBtn">👆<br>戳我</button>
  <div class="hint" id="hint">初始化中...</div>
  <div class="footer">需要联网</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/peerjs@1.5.2/dist/peerjs.min.js"></script>
<script>
// ========== 纯 P2P 连接 (PeerJS) ==========
let peer = null;
let conn = null;
let paired = false;

function init() {
  const targetId = location.hash.replace(/^#/, '');
  const myId = 'buzz_' + Math.random().toString(36).slice(2, 6);

  peer = new Peer(myId);

  peer.on('open', (id) => {
    if (targetId) {
      setStatus('alone', '正在连接对方...');
      connectToPeer(targetId);
    } else {
      const url = location.href.replace(/#.*$/, '') + '#' + id;
      document.getElementById('shareLink').value = url;
      document.getElementById('shareBox').style.display = 'block';
      setStatus('alone', '等待对方加入');
      document.getElementById('hint').innerHTML = '把上面的链接发给对方';
    }
  });

  peer.on('connection', (c) => {
    conn = c;
    setupConnection();
  });

  peer.on('error', () => {
    setStatus('', '连接失败，请刷新页面重试');
  });
}

function connectToPeer(id) {
  const c = peer.connect(id, { reliable: true });
  c.on('open', () => {
    conn = c;
    setupConnection();
  });
  c.on('error', () => {
    setStatus('', '连接失败，请确认对方还在页面');
  });
}

function setupConnection() {
  paired = true;
  setStatus('paired', '已配对！');
  document.getElementById('shareBox').style.display = 'none';
  document.getElementById('buzzBtn').className = 'buzz-btn';
  document.getElementById('hint').innerHTML = '点击按钮，对方手机就有 <strong>反应</strong>';

  conn.on('data', (data) => {
    if (data === 'buzz') receiveBuzz();
  });

  conn.on('close', () => {
    paired = false;
    setStatus('', '连接已断开');
    document.getElementById('buzzBtn').className = 'buzz-btn disabled';
  });
}

// ========== 界面 ==========
function setStatus(state, text) {
  document.getElementById('dot').className = 'dot' + (state ? ' ' + state : '');
  document.getElementById('statusText').textContent = text;
}

function copyLink() {
  const input = document.getElementById('shareLink');
  input.select();
  document.execCommand('copy');
  const btn = document.getElementById('copyBtn');
  btn.textContent = '已复制 ✓';
  setTimeout(() => btn.textContent = '复制', 1500);
}

// ========== 音效（Web Audio，不需要文件） ==========
let audioCtx = null;

function playBuzzSound() {
  try {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    // 短促的"嗡嗡"音效
    const c = audioCtx;
    [200, 300, 400].forEach((freq, i) => {
      const osc = c.createOscillator();
      const gain = c.createGain();
      osc.type = 'sine';
      osc.frequency.value = freq;
      gain.gain.setValueAtTime(0.3, c.currentTime + i * 0.08);
      gain.gain.exponentialRampToValueAtTime(0.001, c.currentTime + i * 0.08 + 0.15);
      osc.connect(gain).connect(c.destination);
      osc.start(c.currentTime + i * 0.08);
      osc.stop(c.currentTime + i * 0.08 + 0.15);
    });
  } catch(e) { /* 静默失败 */ }
}

// ========== 发送 & 接收 ==========
function sendBuzz() {
  if (!paired || !conn) return;
  conn.send('buzz');
  const btn = document.getElementById('buzzBtn');
  btn.innerHTML = '✓<br>已发送';
  setTimeout(() => btn.innerHTML = '👆<br>戳我', 300);
}

function receiveBuzz() {
  // 1. 振动（仅 Android 支持）
  if (navigator.vibrate) {
    navigator.vibrate([80, 40, 80, 40, 160]);
  }

  // 2. 音效（Android + iOS 都支持）
  playBuzzSound();

  // 3. 按钮剧烈动画 + 全屏闪光
  const btn = document.getElementById('buzzBtn');
  btn.className = 'buzz-btn receiving';
  btn.innerHTML = '💥<br>嗡嗡嗡';

  // 4. 全屏闪白
  const flash = document.getElementById('flashOverlay');
  flash.className = 'flash-overlay go';
  setTimeout(() => flash.className = 'flash-overlay', 700);

  // 5. 屏幕抖动
  const container = document.getElementById('container');
  container.classList.add('shake');
  setTimeout(() => container.classList.remove('shake'), 600);

  // 6. 顶部横幅滑入
  const banner = document.getElementById('banner');
  banner.className = 'banner show';
  setTimeout(() => banner.className = 'banner', 1200);

  // 恢复按钮
  setTimeout(() => {
    btn.className = 'buzz-btn' + (paired ? '' : ' disabled');
    btn.innerHTML = '👆<br>戳我';
  }, 900);
}

init();
</script>
</body>
</html>
